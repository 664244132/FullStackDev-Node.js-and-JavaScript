<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAGE 1</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="./index.css" />
</head>

<body>
    <div class="container text-center justify-content-center mx-12 p-5">
        <div class="card col-6 mx-auto mt-3 card card-body bg-primary p-2 text-dark bg-opacity-75">
            <div clss="card-body">
                <h1>Login</h1>
            </div>
            <div class="card-body">
                <div class="row px -3">
                    <div class="col-6">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username" class="form-control" />
                    </div>
                    <div class="col-6">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" class="form-control" />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="d-grid gap-2 col-6 mx-auto mt-3">
                    <button type="submit" onclick="login(event)" class="btn btn-danger">
                        Login
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function login(event) {
            event.preventDefault();
            console.log("Click Login");

            const username = document.querySelector("#username").value;
            const password = document.querySelector("#password").value;

            try {
                const res = await fetch(`http://localhost:3000/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                // console.log(await res.json());
                const data = await res.json();
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.user.username);
                window.location.href = "./dashboard.html";
            } catch (error) {
                console.log(error);
            }
        }
    </script>
</body>

</html>
